# markgate configuration — https://github.com/go-to-k/markgate
#
# Seven gates back the pre-commit / pre-PR / pre-merge checks for cdk-local.
# cdk-local does NOT deploy to AWS (no destroy path, no schema migration,
# no broad real-AWS integ matrix), so the destroy / broad / schema-migration
# gates from cdkd are not needed.
#
# Gates:
#   check          — typecheck/lint/build/unit tests
#                    (set by /check and /verify-pr).
#   docs           — README/CLAUDE.md/docs consistency with src
#                    (set by /check-docs and /verify-pr).
#   verify-pr      — full PR-readiness checklist (live-test of changed
#                    behavior, shared-utility caller verification, PR
#                    title + body freshness, retrospective). Set ONLY by
#                    /verify-pr. Declared as `requires: [check, docs]`
#                    so freshness is the AND of those children plus the
#                    skill's own work.
#   pr-review      — `/review-pr` reviewer-dispatch verification on
#                    size-flagged PRs. Bound to the PR's HEAD sha via the
#                    `.markgate-pr-review-sha` sentinel file.
#   integ          — Docker-based local-execution verification with zero
#                    orphan containers / networks. Set ONLY by /run-integ
#                    when a `local-*` integ test finishes cleanly AND the
#                    post-run `docker ps` / `docker network ls` sweep is
#                    empty. 14d TTL — Docker base images, RIE binary,
#                    chokidar / network behavior, dockerd semantics drift
#                    over time, so a marker that's been clean for two
#                    weeks no longer proves today's local code path works.
#   cdkd-parity    — Host-CLI (cdkd) parity review for library-surface
#                    changes (new subcommand factory / new CLI option /
#                    new public helper / behavior change). Set ONLY by
#                    /check-cdkd-parity. Scope is the public library
#                    surface; out-of-scope diffs don't invalidate it.
#   create-integ   — A NEW `src/cli/commands/local-<verb>.ts` factory (a
#                    brand-new subcommand) MUST ship its own integ fixture.
#                    Set ONLY by /create-integ, which scaffolds + RUNS the
#                    new fixture. Pre-create only, like cdkd-parity.

gates:
  check:
    hash: files
    include:
      - "src/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "vitest.config.ts"
      - ".eslintrc*"
      - ".prettierrc*"

  docs:
    hash: files
    include:
      - "src/**"
      - "docs/**"
      - "README.md"
      - ".claude/CLAUDE.md"
      - ".claude/rules/**"

  verify-pr:
    requires: [check, docs]

  pr-review:
    hash: files
    include:
      - ".markgate-pr-review-sha"

  integ:
    hash: files
    # Wall-clock TTL on top of the file-scope check (markgate 0.3+).
    # Docker base-image behavior (`public.ecr.aws/lambda/*`, RIE binary),
    # `dockerd` semantics, and chokidar / network plumbing drift even
    # when the repo doesn't. 14d matches cdkd's integ-local gate —
    # aggressive enough to catch environment drift, lax enough to avoid
    # forcing a Docker run on every local-touching PR.
    ttl: 14d
    include:
      - "src/**"
      - "tests/integration/**"

  cdkd-parity:
    hash: files
    # Scope is the public library surface that cdkd (and any other host
    # CLI) embeds: the CLI command factories, the unstable internal
    # subpath, and the stable index export list. Edits anywhere else
    # in `src/**` don't invalidate this marker — they don't affect
    # what a host CLI sees.
    include:
      - "src/cli/commands/**"
      - "src/internal.ts"
      - "src/index.ts"

  create-integ:
    hash: files
    # A NEW `src/cli/commands/local-<verb>.ts` factory (a file declaring
    # `createLocal<Verb>Command`) is a brand-new subcommand with NO
    # existing integ fixture, so it MUST ship its own.
    # `create-integ-gate.sh` (pre-create only) fires when the PR adds such
    # a factory file; `/create-integ` scaffolds + RUNS the new fixture and
    # sets this marker. Scope is the whole command-factory surface, which
    # is intentionally BROADER than the gate's trigger: any
    # `src/cli/commands/**` edit stales the marker, but the gate only
    # BLOCKS when a new factory file is also added, so staleness without a
    # new-file add is a no-op. Pre-create-only, like cdkd-parity, so a
    # later edit on the same PR doesn't re-block.
    include:
      - "src/cli/commands/**"
